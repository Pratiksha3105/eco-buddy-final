<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoBuddy Admin</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css">

<style>
body{background:#f4f6f9}
#reportsMap{height:400px;border-radius:10px}
.sidebar{width:240px;height:100vh;position:fixed;background:#1b263b;color:white;padding:20px}
.main{margin-left:260px;padding:20px}
</style>
</head>

<body>

<div class="sidebar">
<h3>EcoBuddy</h3>
<hr>
<p>Admin Panel</p>
</div>

<div class="main">

<h2>Dumping Reports</h2>

<div class="row mb-3">
<div class="col"><div class="card p-3 text-center"><h4 id="totalReports">0</h4>Total</div></div>
<div class="col"><div class="card p-3 text-center"><h4 id="pendingReports">0</h4>Pending</div></div>
<div class="col"><div class="card p-3 text-center"><h4 id="resolvedReports">0</h4>Resolved</div></div>
</div>

<div id="reportsMap" class="mb-4"></div>

<table id="reportsTable" class="table table-bordered">
<thead>
<tr>
<th>ID</th>
<th>Location</th>
<th>Reporter</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

const table = $('#reportsTable').DataTable();

const map = L.map('reportsMap').setView([18.52,73.85],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function loadReports(){

$.get('http://localhost:5000/api/reports', function(data){

table.clear();

let total=0,pending=0,resolved=0;
let heat=[];

data.forEach(r=>{

total++;
if(r.status=="Pending") pending++;
if(r.status=="Resolved") resolved++;

if(r.latitude && r.longitude){
heat.push([r.latitude,r.longitude,1]);
}

let statusSelect = `
<select class="statusChange" data-id="${r._id}">
<option ${r.status=="Pending"?"selected":""}>Pending</option>
<option ${r.status=="In Progress"?"selected":""}>In Progress</option>
<option ${r.status=="Assigned to Worker"?"selected":""}>Assigned to Worker</option>
<option ${r.status=="Resolved"?"selected":""}>Resolved</option>
</select>`;

table.row.add([
"#REP-"+r._id.slice(-5),
r.location || "Unknown",
r.reporterName || "Anonymous",
new Date(r.dateReported).toLocaleDateString(),
statusSelect,
"<button class='btn btn-sm btn-primary'>View</button>"
]);

});

table.draw();

$('#totalReports').text(total);
$('#pendingReports').text(pending);
$('#resolvedReports').text(resolved);

if(heat.length>0){
L.heatLayer(heat,{radius:30}).addTo(map);
}

});

}

loadReports();

$('#reportsTable').on('change','.statusChange',function(){

let id=$(this).data('id');
let status=$(this).val();

$.ajax({
url:`http://localhost:5000/api/admin/updateStatus/${id}`,
type:"PUT",
contentType:"application/json",
data:JSON.stringify({status}),
success:()=>{alert("Updated");loadReports()},
error:()=>alert("Error updating")
});

});

</script>

</body>
</html>
